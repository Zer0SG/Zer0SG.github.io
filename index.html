<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css" />
    <title>RAD R&D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Pacifico&display=swap');

        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: #333;
            background: #f2f2f2;
        }

        header {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: #fff;
            padding: 60px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-family: 'Pacifico', cursive;
            font-size: 3em;
            text-shadow: 2px 2px #222;
        }

        header p {
            font-size: 1.2em;
            margin-top: 10px;
        }

        nav {
            background: #222;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 12px 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ff4b2b;
        }

        section {
            padding: 50px 20px;
            max-width: 1100px;
            margin: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            color: #222;
        }

        .services, .invoices, .quotes {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 20px;
        }

        .service-box, .invoice-box, .quote-box {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            flex: 1 1 300px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .service-box:hover, .invoice-box:hover, .quote-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        .service-box h3, .invoice-box h3, .quote-box h3 {
            color: #ff4b2b;
            font-size: 1.5em;
        }

        .service-box ul {
            padding-left: 20px;
        }

        .service-box li {
            margin-bottom: 6px;
        }

        .invoice-box table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .invoice-box th, .invoice-box td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .invoice-box th {
            background: #ff4b2b;
            color: #fff;
        }

        .total-row td {
            font-weight: bold;
        }

        footer {
            background: #222;
            color: #fff;
            text-align: center;
            padding: 25px;
            font-size: 0.9em;
        }

        a {
            color: #ff4b2b;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Scroll animation for services, invoices, and quote forms */
        .service-box, .invoice-box, .quote-box {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <!-- Header Section -->
    <section id="header">
        <a href="#"><img src="Images/Logo.png" class="logo" width="150" height="150" alt="logo"></a>
        
        <div>
            <ul id="navbar">
                <li><a class="active" href="index.html">Home</a></li>
                <li><a href="showcase.html">Showcase</a></li>
                <li><a href="HeavyD.html">Heavy D Studios</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#"><img src="Images/cart.png" width="50" height="50" alt="shopping cart"></a></li>
            </ul>
        </div>
    </section>

   
    <!-- Footer Section -->
    <footer>
        &copy; 2026 RAD R&D | All Rights Reserved
    </footer>

    <script>
        // Scroll animation for services, invoices, and quote forms
        const boxes = document.querySelectorAll('.service-box, .invoice-box, .quote-box');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });
        boxes.forEach(box => observer.observe(box));
    </script>

</body>

</html>
